name = "dovr-agency-app"
client_id = "YOUR_SHOPIFY_API_KEY"
application_url = "https://YOUR_APP_URL"
embedded = true

[webhooks]
  api_version = "2025-04"

[auth]
  redirect_urls = [
    "https://YOUR_APP_URL/auth/callback",
    "https://YOUR_APP_URL/auth/shopify/callback",
    "https://YOUR_APP_URL/api/auth/callback"
  ]

[pos]
  embedded = false

[access_scopes]
  scopes = "read_products,write_products,read_orders,read_customers"

[build]
  automatically_update_urls_on_dev = true
  dev_store_url = ""
